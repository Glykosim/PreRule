<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Et enkelt verktøy for å planlegge og beskrive algoritmer steg for steg.">
  <title>Algoritmehjelp Verktøy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d0d5dd;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b42318;
      --shadow: 0 12px 30px rgb(16 24 40 / 10%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 24px clamp(16px, 4vw, 48px);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
    }

    header p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
      gap: 24px;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 24px clamp(16px, 4vw, 48px);
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.25rem;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      background: #ffffff;
      color: var(--text);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: #ffffff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: #eef2ff;
      color: var(--accent-dark);
    }

    .danger {
      background: #fee4e2;
      color: var(--danger);
    }

    .output {
      min-height: 460px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      color: var(--muted);
    }

    @media (max-width: 840px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Algoritmehjelp Verktøy</h1>
    <p>Lag en tydelig algoritme med mål, input, prosess og forventet output.</p>
  </header>

  <main>
    <section aria-labelledby="form-title">
      <h2 id="form-title">Bygg algoritmen</h2>
      <form id="algorithm-form">
        <label for="title">Navn på algoritme</label>
        <input id="title" name="title" type="text" placeholder="For eksempel: Finn største tall">

        <label for="goal">Mål</label>
        <textarea id="goal" name="goal" placeholder="Hva skal algoritmen løse?"></textarea>

        <label for="input">Input</label>
        <textarea id="input" name="input" placeholder="Hvilke data trenger algoritmen?"></textarea>

        <label for="steps">Steg</label>
        <textarea id="steps" name="steps" placeholder="Skriv ett steg per linje"></textarea>

        <label for="output">Output</label>
        <textarea id="output" name="output" placeholder="Hva skal algoritmen returnere eller vise?"></textarea>

        <label for="format">Format</label>
        <select id="format" name="format">
          <option value="tekst">Forklaring</option>
          <option value="pseudokode">Pseudokode</option>
          <option value="sjekkliste">Sjekkliste</option>
        </select>

        <div class="actions">
          <button class="primary" type="submit">Generer</button>
          <button class="secondary" id="copy-button" type="button">Kopier</button>
          <button class="danger" id="reset-button" type="reset">Tøm</button>
        </div>
      </form>
    </section>

    <section aria-labelledby="result-title">
      <h2 id="result-title">Resultat</h2>
      <div id="result" class="output empty">Fyll ut feltene og trykk Generer.</div>
    </section>
  </main>

  <script>
    const form = document.querySelector("#algorithm-form");
    const result = document.querySelector("#result");
    const copyButton = document.querySelector("#copy-button");

    function listSteps(value, prefix) {
      const steps = value
        .split("\n")
        .map((step) => step.trim())
        .filter(Boolean);

      if (steps.length === 0) {
        return `${prefix} Ingen steg lagt inn.`;
      }

      return steps
        .map((step, index) => `${prefix} ${index + 1}. ${step}`)
        .join("\n");
    }

    function fieldValue(name) {
      const value = new FormData(form).get(name);
      return String(value || "").trim();
    }

    function generateText() {
      const title = fieldValue("title") || "Uten navn";
      const goal = fieldValue("goal") || "Ikke beskrevet";
      const input = fieldValue("input") || "Ikke beskrevet";
      const steps = fieldValue("steps");
      const output = fieldValue("output") || "Ikke beskrevet";
      const format = fieldValue("format");

      if (format === "pseudokode") {
        return [
          `ALGORITME ${title}`,
          `MAL: ${goal}`,
          `INPUT: ${input}`,
          "STEG:",
          listSteps(steps, ""),
          `OUTPUT: ${output}`,
          "SLUTT"
        ].join("\n");
      }

      if (format === "sjekkliste") {
        return [
          `Sjekkliste: ${title}`,
          `[ ] Mål: ${goal}`,
          `[ ] Input: ${input}`,
          listSteps(steps, "[ ]"),
          `[ ] Output: ${output}`
        ].join("\n");
      }

      return [
        `Algoritme: ${title}`,
        "",
        `Mål: ${goal}`,
        `Input: ${input}`,
        "",
        "Steg:",
        listSteps(steps, ""),
        "",
        `Output: ${output}`
      ].join("\n");
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      result.textContent = generateText();
      result.classList.remove("empty");
    });

    form.addEventListener("reset", () => {
      result.textContent = "Fyll ut feltene og trykk Generer.";
      result.classList.add("empty");
    });

    copyButton.addEventListener("click", async () => {
      if (result.classList.contains("empty")) {
        return;
      }

      await navigator.clipboard.writeText(result.textContent);
      copyButton.textContent = "Kopiert";
      setTimeout(() => {
        copyButton.textContent = "Kopier";
      }, 1200);
    });
  </script>
</body>
</html>
